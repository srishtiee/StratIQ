version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: stratiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stratiq
      POSTGRES_USER: stratiq
      POSTGRES_PASSWORD: stratiq
    ports:
      - "5432:5432"
    volumes:
      - stratiq_postgres:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install -r api/requirements.txt && python -m uvicorn api.app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://stratiq:stratiq@postgres:5432/stratiq
      STRATIQ_AUTO_INIT_DB: "true"
      STRATIQ_AUTH_MODE: demo
      STRATIQ_LLM_MODE: deterministic
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  stratiq_postgres:

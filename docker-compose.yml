version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: stratiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stratiq
      POSTGRES_USER: stratiq
      POSTGRES_PASSWORD: stratiq
    ports:
      - "5432:5432"
    volumes:
      - stratiq_postgres:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  stratiq_postgres:
